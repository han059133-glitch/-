<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃课生存挑战</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #f5f5f5;
}
.container {
    margin-top: 30px;
}
button {
    margin: 10px;
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 8px;
}
.log {
    margin-top: 20px;
    height: 200px;
    overflow-y: auto;
    background: white;
    padding: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h2>逃课生存挑战</h2>
    <p>生命值：<span id="hp">8</span></p>
    <p>第 <span id="round">1</span> 轮</p>

    <button onclick="play('skip')">逃课</button>
    <button onclick="play('proxy')">请代课</button>
    <button onclick="play('roommate')">拜托舍友</button>

    <div class="log" id="log"></div>
</div>

<script>
let hp = 8;
let round = 1;

let stats = {
    skip: 0,
    proxy: 0,
    roommate: 0,
    luckySkip: 0,
    safeProxy: 0,
    safeRoommate: 0
};

function randomResult() {
    const arr = ["不点名", "纸质签到", "定位签到"];
    return arr[Math.floor(Math.random() * arr.length)];
}

function log(msg) {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += "<p>" + msg + "</p>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

function play(choice) {
    if (hp <= 0) return;

    stats[choice]++;

    let result = randomResult();
    let damage = 0;

    if (result === "不点名") {
        log(`本轮结果：不点名 ✅ 无事发生`);
        if (choice === "skip") stats.luckySkip++;
        if (choice === "proxy") stats.safeProxy++;
        if (choice === "roommate") stats.safeRoommate++;
    }

    if (result === "纸质签到") {
        if (choice === "skip") damage = 2;
        if (choice === "roommate" && Math.random() < 0.5) damage = 2;
        log(`本轮结果：纸质签到`);
    }

    if (result === "定位签到") {
        if (choice === "skip") damage = 2;
        if (choice === "proxy") damage = 3;
        if (choice === "roommate" && Math.random() < 0.5) damage = 3;
        log(`本轮结果：定位签到`);
    }

    hp -= damage;
    if (hp < 0) hp = 0;

    document.getElementById("hp").innerText = hp;
    document.getElementById("round").innerText = round;

    log(`选择：${getChoiceName(choice)}，扣血：${damage}，剩余生命：${hp}`);

    round++;

    if (hp <= 0) endGame();
}

function getChoiceName(c) {
    return {
        skip: "逃课",
        proxy: "请代课",
        roommate: "拜托舍友"
    }[c];
}

function endGame() {
    let title = "";

    if (stats.skip === round - 1) {
        title = "孤胆英雄";
    } else if (stats.luckySkip >= 3) {
        title = "幸运儿";
    } else if (stats.safeProxy >= 3) {
        title = "这钱花的值！";
    } else if (stats.safeRoommate >= 3) {
        title = "人脉王！";
    } else {
        title = "普通大学生";
    }

    log("===== 游戏结束 =====");
    log(`存活轮次：${round - 1}`);
    log(`逃课次数：${stats.skip}`);
    log(`代课次数：${stats.proxy}`);
    log(`舍友次数：${stats.roommate}`);
    log(`称号：${title}`);
}
</script>

</body>
</html>
