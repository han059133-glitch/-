<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃课生存挑战</title>

<style>
body {
    margin: 0;
    font-family: "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.rule {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    font-size: 13px;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}

h1 { text-align: center; }

.status {
    text-align: center;
    font-size: 18px;
    margin: 10px 0;
}

button {
    width: 100%;
    margin: 6px 0;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 15px;
}

.roundResult {
    margin-top: 12px;
    padding: 12px;
    background: #f8f9ff;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
}

.result {
    text-align: center;
    font-size: 18px;
    margin-top: 12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="rule">
📜 <b>游戏规则</b><br>
逃课 / 代课 / 舍友 → 随机点名<br>
🟢 不点名：安全<br>
📄 纸质签到：逃课扣2<br>
📍 定位签到：风险更高<br>
🪙 赌命：-2血，赢+4（最多3次）<br>
⚡ 事件会改变规则
</div>

<h1>🎓逃课生存挑战</h1>

<div class="status">
❤️ <span id="hp">8</span> | 第 <span id="round">1</span> 轮
</div>

<button onclick="play('skip')">😎 逃课</button>
<button onclick="play('proxy')">💰 请代课</button>
<button onclick="play('roommate')">🤝 舍友帮忙</button>
<button onclick="coinFlip()">🪙 赌命（-2血）</button>

<div class="roundResult" id="roundResult">
点击按钮开始游戏
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>
let hp = 8;
let round = 1;
let coinCount = 0;

let stats = { skip:0, proxy:0, roommate:0 };
let coinWin = 0, coinLose = 0;

let eventStats = { 慈悲:0, 巡查:0, 代课翻车:0 };

let noDamageStreak = 0, damageStreak = 0;
let maxNoDamage = 0, maxDamage = 0;

function randomResult(){
    return ["不点名","纸质签到","定位签到"][Math.floor(Math.random()*3)];
}

function randomEvent(){
    if(Math.random()>0.3) return null;
    return ["慈悲","巡查","代课翻车"][Math.floor(Math.random()*3)];
}

function getChoiceName(c){
    return {
        skip:"逃课",
        proxy:"请代课",
        roommate:"舍友帮忙"
    }[c];
}

// 🎲 赌命
function coinFlip(){
    if(hp < 2 || coinCount >= 3){
        updateResult("⚠️ 无法赌命");
        return;
    }

    hp -= 2;
    coinCount++;

    let text = "";

    if(Math.random()<0.5){
        hp += 4;
        coinWin++;
        text = "🪙 正面！血赚 +4";
    }else{
        coinLose++;
        text = "💀 反面…亏了2血";
    }

    document.getElementById("hp").innerText = hp;

    updateResult(`
🎲 赌命结果<br>
${text}<br>
❤️ 当前生命：${hp}
`);
}

// 🎮 主逻辑
function play(choice){
    if(hp<=0) return;

    stats[choice]++;

    let result = randomResult();
    let event = randomEvent();

    let damage = 0;
    let roommateRate = 0.5;
    let reduce = 0;
    let proxyFail = false;

    let eventText = "无";

    if(event){
        eventStats[event]++;
        eventText = event;

        if(event==="慈悲") reduce = 1;
        if(event==="巡查") roommateRate = 0.9;

        if(event==="代课翻车" && choice==="proxy" && Math.random()<0.5){
            proxyFail = true;
        }
    }

    if(result==="纸质签到"){
        if(choice==="skip") damage=2;
        if(choice==="roommate" && Math.random()<roommateRate) damage=2;
    }

    if(result==="定位签到"){
        if(choice==="skip") damage=2;
        if(choice==="proxy") damage=3;
        if(choice==="roommate" && Math.random()<roommateRate) damage=3;
    }

    if(proxyFail) damage = 2;

    damage = Math.max(0, damage - reduce);

    hp -= damage;
    if(hp<0) hp=0;

    // 连击统计
    if(damage===0){
        noDamageStreak++;
        damageStreak=0;
    }else{
        damageStreak++;
        noDamageStreak=0;
    }

    maxNoDamage = Math.max(maxNoDamage, noDamageStreak);
    maxDamage = Math.max(maxDamage, damageStreak);

    document.getElementById("hp").innerText = hp;
    document.getElementById("round").innerText = round;

    updateResult(`
📌 点名：${result}<br>
⚡ 事件：${eventText}<br>
👉 选择：${getChoiceName(choice)}<br>
💔 扣血：${damage}<br>
❤️ 剩余：${hp}
`);

    round++;

    if(hp<=0) endGame();
}

function updateResult(html){
    document.getElementById("roundResult").innerHTML = html;
}

// 🏁 结算
function endGame(){

    let titles = [];

    if(stats.skip === round-1) titles.push("😎 孤胆英雄");
    if(stats.proxy >=5) titles.push("💰 氪金战士");
    if(stats.roommate >=5) titles.push("🤝 人脉王");
    if(stats.skip>=2 && stats.proxy>=2 && stats.roommate>=2) titles.push("🧠 策略大师");

    if(maxNoDamage>=3) titles.push("🍀 天选之子");
    if(maxDamage>=3) titles.push("😭 非洲酋长");
    if(coinWin>=2) titles.push("🎲 赌狗之王");
    if(coinLose>=2) titles.push("💀 赌狗翻车王");

    if(eventStats["慈悲"]>=2) titles.push("🙏 天命加身");
    if(eventStats["巡查"]>=2) titles.push("👀 被重点关注");
    if(eventStats["代课翻车"]>=2) titles.push("🤡 社会性死亡");

    if(round<=3) titles.push("🧊 开局即凉");
    if(round>=10) titles.push("🏆 苟王之王");

    if(titles.length===0) titles.push("🙂 普通大学生");

    let show = titles.sort(()=>0.5-Math.random()).slice(0,2).join(" + ");

    document.getElementById("result").innerHTML =
        `🎉 游戏结束<br>存活 ${round-1} 轮<br>🏅 ${show}`;
}
</script>

</body>
</html>
