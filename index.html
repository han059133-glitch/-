<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃课生存挑战</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:PingFang SC;background:linear-gradient(135deg,#667eea,#764ba2)}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#fff;border-radius:16px;padding:15px;box-shadow:0 10px 25px rgba(0,0,0,.2)}
.rule{background:rgba(255,255,255,.95);font-size:13px;padding:10px;border-radius:10px;line-height:1.6}
h1{text-align:center}
.status{text-align:center;font-size:18px;margin:10px 0}
button{width:100%;margin:6px 0;padding:12px;border:none;border-radius:10px;background:#667eea;color:#fff;font-size:15px}
button:disabled{background:#aaa}
.roundResult{margin-top:12px;padding:12px;background:#f8f9ff;border-radius:12px;font-size:14px;white-space:pre-line}
.result{text-align:center;font-size:15px;margin-top:12px;line-height:1.6}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="rule">
🎓 逃课生存挑战<br>
📌 逃课 / 代课 / 舍友代签<br>
⚠️ 学期会逐渐崩坏<br>
🧠 老师会“记仇”
</div>

<h1>🎓 逃课生存挑战</h1>

<button onclick="startGame()" id="startBtn">▶️ 开始游戏</button>

<div id="gameArea" style="display:none;">
<div class="status">
❤️ <span id="hp">8</span> | 第 <span id="round">1</span> 轮<br>
📚 学期 <span id="sem">1</span> | 崩坏 <span id="col">0</span>
</div>

<button onclick="play('skip')">😎 逃课</button>
<button onclick="play('proxy')">💰 代课</button>
<button onclick="play('roommate')">🤝 舍友</button>
<button onclick="coinFlip()">🪙 赌命</button>
</div>

<div class="roundResult" id="roundResult">点击开始游戏</div>
<div class="result" id="result"></div>

</div>
</div>

<script>

//////////////// Firebase //////////////////
const firebaseConfig = {
    apiKey:"YOUR_KEY",
    authDomain:"YOUR_DOMAIN",
    projectId:"YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

//////////////// 状态 //////////////////
let hp, round, coinCount, gameOver;
let stats, coinWin, coinLose, eventStats;
let teacherAnger = 0;
let semester = 1, semesterRound = 1, collapse = 0;

function startGame(){
    document.querySelector(".rule").style.display="none";
    document.getElementById("startBtn").style.display="none";
    document.getElementById("gameArea").style.display="block";
    init();
}

function init(){
    hp=8;round=1;coinCount=0;gameOver=false;
    stats={skip:0,proxy:0,roommate:0};
    coinWin=0;coinLose=0;
    eventStats={慈悲:0,巡查:0,代课翻车:0};
    updateUI();
}

//////////////// 系统 //////////////////
function randomResult(){
    if(collapse>=8) return Math.random()<0.8?"定位签到":"纸质签到";
    if(collapse>=4) return Math.random()<0.5?"定位签到":"纸质签到";
    return ["不点名","纸质签到","定位签到"][Math.random()*3|0];
}

function randomEvent(){
    if(collapse>=6 && Math.random()<0.5) return "巡查";
    if(Math.random()>0.3) return null;
    return ["慈悲","巡查","代课翻车"][Math.random()*3|0];
}

function getChoice(c){
    return {skip:"逃课",proxy:"代课",roommate:"舍友"}[c];
}

//////////////// 赌命 //////////////////
function coinFlip(){
    if(gameOver||hp<2||coinCount>=3) return;

    hp-=2;coinCount++;teacherAnger++;

    if(Math.random()<0.5){hp+=4;coinWin++;}
    else coinLose++;

    collapse++;
    updateUI();
    checkGameOver();
}

//////////////// 主逻辑 //////////////////
function play(c){

    if(gameOver) return;

    stats[c]++;

    teacherAnger += (c==="skip"?2:1);
    collapse += 1;
    semesterRound++;

    let r=randomResult();
    let e=randomEvent();

    let dmg=0;

    if(r==="纸质签到"){
        if(c==="skip") dmg=2;
        if(c==="roommate"&&Math.random()<0.5) dmg=2;
    }

    if(r==="定位签到"){
        if(c==="skip") dmg=2;
        if(c==="proxy") dmg=3;
    }

    if(e==="代课翻车") dmg+=2;

    if(e==="慈悲") dmg-=1;
    if(dmg<0) dmg=0;

    hp-=dmg;
    round++;

    updateUI();

    updateResult(
`📌 ${r}
⚡ ${e||"无"}：${getEventDesc(e)}
👉 ${getChoice(c)}
💔 -${dmg}
❤️ ${hp}
📚 学期${semester} 崩坏${collapse}`
    );

    if(semesterRound>=8){
        semester++;semesterRound=1;collapse+=2;
    }

    checkGameOver();
}

function getEventDesc(e){
    if(!e) return "系统正常";
    if(e==="慈悲") return "扣血减少";
    if(e==="巡查") return "点名增强";
    if(e==="代课翻车") return "额外风险";
}

//////////////// UI //////////////////
function updateUI(){
    document.getElementById("hp").innerText=hp;
    document.getElementById("round").innerText=round;
    document.getElementById("sem").innerText=semester;
    document.getElementById("col").innerText=collapse;
}

function updateResult(t){
    document.getElementById("roundResult").innerText=t;
}

//////////////// 分数 //////////////////
function getScore(){
    return round*10+stats.skip*2+stats.proxy*5+stats.roommate*5+coinWin*8;
}

//////////////// 上传 //////////////////
async function upload(s){
    await db.collection("players").add({
        score:s,skip:stats.skip,proxy:stats.proxy,roommate:stats.roommate,time:Date.now()
    });
}

async function rank(s){
    let snap=await db.collection("players").get();
    let t=snap.size,b=0;
    snap.forEach(d=>{if(d.data().score<s)b++;});
    return t?Math.floor(b/t*100):50;
}

//////////////// 结局 //////////////////
async function checkGameOver(){
    if(hp>0) return;
    gameOver=true;

    let t=stats.skip+stats.proxy+stats.roommate||1;
    let skipR=stats.skip/t;

    let title="",reason="";

    if(collapse>=10) title="💀 学期崩坏者",reason="系统彻底失控";
    else if(coinWin>=2) title="🎲 赌命之王",reason="高风险获益";
    else if(skipR>=0.5) title="😈 逃课大师",reason="高频逃课";
    else title="🧠 生存者",reason="均衡策略";

    let score=getScore();
    await upload(score);
    let r=await rank(score);

    document.getElementById("result").innerText=
`🎉 结束
🏅 ${title}
💬 ${reason}

📊 逃课${stats.skip} 代课${stats.proxy} 舍友${stats.roommate}
🪙 赌命${coinCount}

🌍 超过${r}%玩家`;
}

</script>
</body>
</html>
