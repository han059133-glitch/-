<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃课生存挑战</title>

<style>
body {
    margin: 0;
    font-family: "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.rule {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    font-size: 13px;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    line-height: 1.6;
}

h1 { text-align: center; }

.status {
    text-align: center;
    font-size: 18px;
    margin: 10px 0;
}

button {
    width: 100%;
    margin: 6px 0;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 15px;
}

.roundResult {
    margin-top: 12px;
    padding: 12px;
    background: #f8f9ff;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
}

.result {
    text-align: center;
    font-size: 18px;
    margin-top: 12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="rule">
今天不想上课！<br>
🎯 游戏目标：尽可能活得更久！生命值降到 0，游戏结束<br>
🧠 每一轮你要做选择：逃课 / 舍友代签 / 请代课<br>
🎲 如果不点名，什么都不会发生（最安全）<br>
如果纸质签到，则逃课扣除2生命值，舍友代签可能被发现（扣除2生命值），请代课安全<br>
如果定位签到，则逃课扣除2生命值，舍友代签可能被发现（扣除3生命值），请代课必然扣除3生命值<br>
⚡ 注意：可能会触发随机事件！<br>
🪙 赌命机制：每局最多 3 次，可消耗 2生命值抛硬币<br>
👉 正面 +4生命值 ｜ 👉 反面 +0生命值
</div>

<h1>🎓逃课生存挑战</h1>

<div class="status">
❤️ <span id="hp">8</span> | 第 <span id="round">1</span> 轮
</div>

<button onclick="play('skip')">😎 逃课</button>
<button onclick="play('proxy')">💰 请代课</button>
<button onclick="play('roommate')">🤝 舍友帮忙</button>
<button onclick="coinFlip()">🪙 赌命（-2血）</button>

<div class="roundResult" id="roundResult">
点击按钮开始游戏
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>
let hp = 8;
let round = 1;
let coinCount = 0;

let stats = { skip:0, proxy:0, roommate:0 };
let coinWin = 0, coinLose = 0;

let eventStats = { 慈悲:0, 巡查:0, 代课翻车:0 };

function randomResult(){
    return ["不点名","纸质签到","定位签到"][Math.floor(Math.random()*3)];
}

function randomEvent(){
    if(Math.random()>0.3) return null;
    return ["慈悲","巡查","代课翻车"][Math.floor(Math.random()*3)];
}

function getChoiceName(c){
    return {
        skip:"逃课",
        proxy:"请代课",
        roommate:"舍友代签"
    }[c];
}

function coinFlip(){
    if(hp < 2 || coinCount >= 3){
        updateResult("⚠️ 无法赌命");
        return;
    }

    hp -= 2;
    coinCount++;

    let text = "";

    if(Math.random()<0.5){
        hp += 4;
        coinWin++;
        text = "🪙 正面！+4生命";
    }else{
        coinLose++;
        text = "💀 反面，什么都没发生";
    }

    document.getElementById("hp").innerText = hp;

    updateResult(`
🎲 赌命结果<br>
${text}<br>
❤️ 当前生命：${hp}
`);
}

function play(choice){
    if(hp<=0) return;

    stats[choice]++;

    let result = randomResult();
    let event = randomEvent();

    let damage = 0;
    let roommateRate = 0.5;
    let reduce = 0;
    let proxyFail = false;

    let eventText = "无";

    if(event){
        eventStats[event]++;
        eventText = event;

        if(event==="慈悲") reduce = 1;
        if(event==="巡查") roommateRate = 0.9;

        if(event==="代课翻车" && choice==="proxy" && Math.random()<0.5){
            proxyFail = true;
        }
    }

    if(result==="纸质签到"){
        if(choice==="skip") damage=2;
        if(choice==="roommate" && Math.random()<roommateRate) damage=2;
    }

    if(result==="定位签到"){
        if(choice==="skip") damage=2;
        if(choice==="proxy") damage=3;
        if(choice==="roommate" && Math.random()<roommateRate) damage=3;
    }

    if(proxyFail) damage = 2;

    damage = Math.max(0, damage - reduce);

    hp -= damage;
    if(hp<0) hp=0;

    document.getElementById("hp").innerText = hp;
    document.getElementById("round").innerText = round;

    updateResult(`
📌 点名：${result}<br>
⚡ 事件：${eventText}<br>
👉 选择：${getChoiceName(choice)}<br>
💔 扣血：${damage}<br>
❤️ 剩余：${hp}
`);

    round++;

    if(hp<=0) endGame();
}

function updateResult(html){
    document.getElementById("roundResult").innerHTML = html;
}

function endGame(){

    let title = "🙂 普通大学生";

    if(stats.skip === round-1) title = "😎 孤胆英雄";
    if(coinWin >=2) title = "🎲 赌狗之王";
    if(eventStats["代课翻车"]>=2) title = "🤡 社会性死亡";

    document.getElementById("result").innerHTML =
        `🎉 游戏结束<br>存活 ${round-1} 轮<br>🏅 ${title}`;
}
</script>

</body>
</html>
