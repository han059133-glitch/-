<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃课生存挑战</title>

<style>
body {margin:0;font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);}
.container {max-width:420px;margin:auto;padding:20px;}
.card {background:#fff;border-radius:16px;padding:20px;}
button {width:100%;margin:8px 0;padding:12px;border:none;border-radius:10px;background:#667eea;color:#fff;}
.log {height:150px;overflow:auto;background:#f5f5f5;padding:10px;border-radius:10px;}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h2>🎓逃课生存挑战</h2>

<p>❤️ <span id="hp">8</span> | 第 <span id="round">1</span> 轮</p>

<button onclick="play('skip')">逃课</button>
<button onclick="play('proxy')">请代课</button>
<button onclick="play('roommate')">舍友帮忙</button>
<button onclick="coinFlip()">🪙 赌一把</button>

<div class="log" id="log"></div>
<div id="result"></div>

</div>
</div>

<script>
let hp=8,round=1,coinCount=0;
let coinWin=0,coinLose=0;

let stats={skip:0,proxy:0,roommate:0};
let eventStats={慈悲:0,巡查:0,代课翻车:0};

function log(t){
let d=document.getElementById("log");
d.innerHTML+= "<div>"+t+"</div>";
d.scrollTop=d.scrollHeight;
}

function randomResult(){
return ["不点名","纸质签到","定位签到"][Math.floor(Math.random()*3)];
}

function randomEvent(){
if(Math.random()>0.3) return null;
return ["慈悲","巡查","代课翻车"][Math.floor(Math.random()*3)];
}

function coinFlip(){
if(hp<2||coinCount>=3)return log("⚠️不能再赌了");
hp-=2;coinCount++;

if(Math.random()<0.5){hp+=4;coinWin++;log("🪙正面+4");}
else{coinLose++;log("💀反面");}

document.getElementById("hp").innerText=hp;
}

function play(choice){
if(hp<=0)return;

stats[choice]++;

let event=randomEvent();
let result=randomResult();
let damage=0;

let roommateRate=0.5,reduce=0,proxyFail=false;

// ✅ 正确位置（不会报错）
if(event){
eventStats[event]++;
if(event==="慈悲"){reduce=1;log("🙏老师慈悲");}
if(event==="巡查"){roommateRate=0.9;log("👀巡查来了");}
if(event==="代课翻车"&&choice==="proxy"&&Math.random()<0.5){
proxyFail=true;log("🤡代课翻车");
}
}

if(result==="不点名"){log("🟢安全");}

if(result==="纸质签到"){
if(choice==="skip")damage=2;
if(choice==="roommate"&&Math.random()<roommateRate)damage=2;
}

if(result==="定位签到"){
if(choice==="skip")damage=2;
if(choice==="proxy")damage=3;
if(choice==="roommate"&&Math.random()<roommateRate)damage=3;
}

if(proxyFail)damage=2;

damage=Math.max(0,damage-reduce);
hp-=damage;

document.getElementById("hp").innerText=hp;
document.getElementById("round").innerText=round;

log("扣血:"+damage+" 剩余:"+hp);

round++;
if(hp<=0)endGame();
}

function endGame(){
let title="普通大学生";
if(coinWin>=2)title="🎲赌狗之王";
if(eventStats["代课翻车"]>=2)title="🤡社会性死亡";

document.getElementById("result").innerHTML=
"🎉结束 存活:"+ (round-1)+"轮<br>"+title;
}
</script>

</body>
</html>
