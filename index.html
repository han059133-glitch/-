<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃课生存挑战</title>

<style>
body{
margin:0;
font-family:PingFang SC;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{max-width:420px;margin:auto;padding:10px}

.card{
background:#fff;
border-radius:16px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.title{
font-size:22px;
text-align:center;
font-weight:700;
margin-bottom:10px;
}

.rule{
font-size:13px;
line-height:1.6;
background:#f7f8ff;
padding:10px;
border-radius:10px;
}

.smallbtn{
background:#444;
font-size:12px;
padding:8px;
border:none;
border-radius:8px;
color:#fff;
margin-top:8px;
width:100%;
}

.detail{
display:none;
margin-top:10px;
font-size:12px;
line-height:1.6;
white-space:pre-line;
background:#ffffff;
padding:10px;
border-radius:10px;
border:1px solid #eee;
}

button{
width:100%;
margin:6px 0;
padding:12px;
border:none;
border-radius:10px;
background:#667eea;
color:#fff;
font-size:15px;
}

button:disabled{
background:#999;
cursor:not-allowed;
opacity:0.6;
}

.status{
text-align:center;
font-size:18px;
margin:10px 0;
}

.roundResult{
margin-top:12px;
padding:12px;
background:#f8f9ff;
border-radius:12px;
font-size:14px;
white-space:pre-line;
}

.result{
text-align:center;
font-size:15px;
margin-top:12px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="title">🎓 逃课生存挑战</div>

<div class="rule">

🎯 存活尽可能久  
🧠 选择：逃课 / 代课 / 舍友代签  
🪙 赌命最多3次  
❤️ HP ≤ 0 游戏结束  

<button class="smallbtn" onclick="toggleRule()">📖 查看详细规则</button>

<div class="detail" id="detailRule">

今天不想上课！

🎯 测试你的逃课人格  
🎯 游戏目标：尽可能存活更久（HP ≤ 0 结束）

🧠 每回合选择：
逃课 / 舍友代签 / 代课

📌 点名规则：
① 不点名：安全  
② 纸质签到：有风险  
③ 定位签到：高风险  

🪙 赌命机制：
消耗2HP → 硬币：
正面 +4HP / 反面 +0HP

</div>

</div>

<button onclick="startGame()" id="startBtn">▶️ 开始游戏</button>

<div id="gameArea" style="display:none;">

<div class="status">
❤️ <span id="hp">8</span> | 第 <span id="round">1</span> 轮
</div>

<button onclick="play('skip')">😎 逃课</button>
<button onclick="play('proxy')">💰 代课</button>
<button onclick="play('roommate')">🤝 舍友代签</button>

<!-- 🪙 赌命按钮（核心修改） -->
<button id="coinBtn" onclick="coinFlip()">
🪙 赌命（-2HP｜剩余 <span id="coinLeft">3</span> 次）
</button>

</div>

<div class="roundResult" id="roundResult"></div>
<div class="result" id="result"></div>

</div>
</div>

<script>

let hp, round, gameOver;
let stats, coinCount, coinWin, coinLose;
let eventStats;

function toggleRule(){
let d=document.getElementById("detailRule");
d.style.display=(d.style.display==="block")?"none":"block";
}

function startGame(){
document.querySelector(".rule").style.display="none";
document.getElementById("startBtn").style.display="none";
document.getElementById("gameArea").style.display="block";
init();
}

function init(){
hp=8;
round=1;
gameOver=false;

stats={skip:0,proxy:0,roommate:0};
coinCount=0;
coinWin=0;
coinLose=0;

eventStats={trap:0,bless:0,watch:0};

updateUI();
}

function updateUI(){
document.getElementById("hp").innerText=hp;
document.getElementById("round").innerText=round;

// 🪙 剩余次数
document.getElementById("coinLeft").innerText = 3 - coinCount;

// 🪙 用完禁用
if(coinCount>=3){
document.getElementById("coinBtn").disabled = true;
}
}

function randomResult(){
return ["不点名","纸质签到","定位签到"][Math.random()*3|0];
}

function randomEvent(){
if(Math.random()>0.8){
return ["代课翻车","慈悲","巡查"][Math.random()*3|0];
}
return null;
}

function getChoice(c){
return {skip:"逃课",proxy:"代课",roommate:"舍友代签"}[c];
}

/* 🪙 赌命系统（修复+UI同步） */
function coinFlip(){

if(gameOver||coinCount>=3) return;

hp -= 2;
coinCount++;

if(hp <= 0){
updateUI();
checkGameOver();
return;
}

if(Math.random()<0.5){
hp += 4;
coinWin++;
}else{
coinLose++;
}

updateUI();
checkGameOver();
}

function play(c){

if(gameOver) return;

stats[c]++;

let r=randomResult();
let e=randomEvent();

let dmg=0;

if(r==="纸质签到"){
if(c==="skip") dmg=2;
if(c==="roommate"&&Math.random()<0.5) dmg=2;
}

if(r==="定位签到"){
if(c==="skip") dmg=2;
if(c==="proxy") dmg=3;
}

if(e==="代课翻车") dmg+=2;
if(e==="慈悲") dmg-=1;

if(dmg<0) dmg=0;

hp-=dmg;
round++;

updateUI();

updateResult(
`📌 ${r}
⚡ ${e||"无"}
👉 ${getChoice(c)}
💔 -${dmg}
❤️ ${hp}`
);

checkGameOver();
}

function updateResult(t){
document.getElementById("roundResult").innerText=t;
}

function getTitle(){

let total = stats.skip + stats.proxy + stats.roommate || 1;
let skipR = stats.skip / total;

if(coinWin===3) return "🍀 欧皇";
if(coinWin===0) return "☠️ 非酋";
if(skipR>=0.5) return "😈 逃课大师";
if(stats.proxy>=3) return "🤝 代课操盘者";

return "🧠 稳定生存者";
}

function getPersona(){

let total = stats.skip + stats.proxy + stats.roommate || 1;
let skipR = stats.skip / total;

if(skipR>=0.5) return "逃课型选手";
if(stats.proxy>=3) return "外包型选手";
if(stats.skip+coinWin>=6) return "豪赌型选手";

return "稳定型选手";
}

function checkGameOver(){

if(hp>0) return;

gameOver=true;

document.getElementById("result").innerText =
`🎉 游戏结束

🏅 称号：${getTitle()}
🧬 人格：${getPersona()}

📊 逃课 ${stats.skip} | 代课 ${stats.proxy} | 舍友 ${stats.roommate}
🪙 赌命 ${coinCount}（成功 ${coinWin}）`;

}

</script>

</body>
</html>
