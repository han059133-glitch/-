<!-- 只展示核心新增逻辑，你直接替换原代码中的 endGame() 和新增变量 -->

<script>

// 新增统计
let coinWin = 0;
let coinLose = 0;
let noDamageStreak = 0;
let damageStreak = 0;
let maxNoDamageStreak = 0;
let maxDamageStreak = 0;
let eventStats = {
    慈悲: 0,
    巡查: 0,
    代课翻车: 0
};

// 修改 coinFlip()
function coinFlip() {
    if (hp <= 0) return;

    if (coinCount >= 3) {
        log("⚠️ 赌太多了，收手吧！");
        return;
    }

    if (hp < 2) {
        log("❌ 血量不够，赌不了");
        return;
    }

    hp -= 2;
    coinCount++;

    if (Math.random() < 0.5) {
        hp += 4;
        coinWin++;
        log("🪙 正面！血赚 +4！");
    } else {
        coinLose++;
        log("💀 反面…白亏2");
    }

    document.getElementById("hp").innerText = hp;
}

// 在 play() 里记录事件次数
if (event) {
    eventStats[event]++;
}

// 在 play() 里最后加（更新连击）
if (damage === 0) {
    noDamageStreak++;
    damageStreak = 0;
} else {
    damageStreak++;
    noDamageStreak = 0;
}

maxNoDamageStreak = Math.max(maxNoDamageStreak, noDamageStreak);
maxDamageStreak = Math.max(maxDamageStreak, damageStreak);


// ⭐⭐⭐ 重写结算 ⭐⭐⭐
function endGame() {

    let titles = [];

    // 🟢 操作流
    if (stats.skip === round - 1) titles.push("😎 孤胆英雄");
    if (stats.proxy >= 5) titles.push("💰 氪金战士");
    if (stats.safeRoommate >= 3) titles.push("🤝 人脉王");
    if (stats.skip >=3 && stats.proxy >=3 && stats.roommate >=3) titles.push("🧠 策略大师");

    // 🟡 运气流
    if (maxNoDamageStreak >= 3) titles.push("🍀 天选之子");
    if (maxDamageStreak >= 3) titles.push("😭 非洲酋长");
    if (coinWin >= 2) titles.push("🎲 赌狗之王");
    if (coinLose >= 2) titles.push("💀 赌狗翻车王");

    // 🔴 事件流
    if (eventStats["慈悲"] >= 2) titles.push("🙏 天命加身");
    if (eventStats["巡查"] >= 2) titles.push("👀 被重点关注");
    if (eventStats["代课翻车"] >= 2) titles.push("🤡 社会性死亡");

    // ⚫ 极端
    if (round <= 3) titles.push("🧊 开局即凉");
    if (round >= 10) titles.push("🏆 苟王之王");
    if (maxDamageStreak === round - 1) titles.push("📉 稳定摆烂");

    // 🎯 绝地翻盘
    if (coinWin >=1 && hp > 0 && hp <= 2) titles.push("🎯 绝地翻盘");

    // 默认
    if (titles.length === 0) titles.push("🙂 普通大学生");

    // 👉 最多显示2个（关键！）
    let finalTitles = titles.slice(0, 2).join(" + ");

    document.getElementById("result").innerHTML =
        `🎉 游戏结束<br>
        存活：${round - 1}轮<br>
        🏅 称号：${finalTitles}`;
}

</script>
